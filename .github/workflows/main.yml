name: Deploy to Alibaba Cloud

on:
  push:
    branches:
      - main  # Robot akan jalan otomatis kalau ada push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executing SSH commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/omdb-search
            git fetch --all
            git reset --hard origin/main
            git config --global --add safe.directory /var/www/omdb-search

            # Hapus semua container yang berhubungan dengan project ini secara bersih
            # Menggunakan perintah V2
            docker compose down --remove-orphans || true
            
            # Jalankan ulang
            docker compose up -d
