name: Deploy to Alibaba Cloud

on:
  push:
    branches:
      - main  # Robot akan jalan otomatis kalau ada push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executing SSH commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/omdb-search
            # 1. Paksa Git untuk membuang editan lokal dan mengikuti GitHub 100%
            git fetch --all
            git reset --hard origin/main
            
            # 2. Pastikan Git merasa folder ini aman
            git config --global --add safe.directory /var/www/omdb-search
            
            # 3. Nyalakan ulang semua kontainer dengan konfigurasi terbaru
            # Kita gunakan 'up -d' agar kalau ada perubahan config langsung diterapkan
            docker-compose up -d
