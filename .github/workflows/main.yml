name: Deploy OMDB Search

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/omdb-search
            
            # 1. Sinkronisasi kode dengan cara bersih
            git fetch origin main
            git reset --hard origin/main
            
            # 2. Deploy menggunakan Docker Compose V2
            # --build: Otomatis build ulang kalau ada perubahan Dockerfile
            # --remove-orphans: Hapus container lama yang sudah tidak dipakai
            docker compose up -d --build --remove-orphans
            
            # 3. Laravel Optimization (Opsional tapi Pro)
            docker exec omdb-app php artisan config:cache
            docker exec omdb-app php artisan route:cache
