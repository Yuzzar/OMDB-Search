version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laksmitha/omdb-search-app
    container_name: omdb-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - omdb-network

  nginx:
    image: nginx:alpine
    container_name: omdb-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - omdb-network
    depends_on:
      - app

  db:
    image: mysql:5.7
    container_name: omdb-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-omdb_search}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-laraveluser}
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - omdb-network

networks:
  omdb-network:
    driver: bridge

volumes:
  dbdata:
